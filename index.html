<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti Retardation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #030303; 
            color: #d1d5db;
            font-family: 'Courier New', Courier, monospace;
        }
        .cyan-glow {
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .btn-option {
            transition: all 0.2s ease-in-out;
        }
        .btn-option:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #008b8b; }
        ::-webkit-scrollbar-thumb:hover { background: #00ffff; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center selection:bg-cyan-900 selection:text-cyan-100">
    
    <div class="w-full max-w-3xl">
        
        <header class="border-b-2 border-cyan-600 pb-4 mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-cyan-400 tracking-widest uppercase">System.Quiz.Parse()</h1>
                <p class="text-sm text-gray-500 mt-2">Local execution environment. Track, score, and evaluate.</p>
            </div>
            <div id="live-counter" class="hidden text-right font-bold text-cyan-600 tracking-wider text-sm">
                PROGRESS: <span id="answered-count">0</span>/<span id="total-count">0</span>
            </div>
        </header>

        <div id="setup-view" class="space-y-6 block">
            <div>
                <label class="block text-cyan-500 mb-2 font-bold uppercase tracking-wider">> Load_Quiz_File (.txt)</label>
                <input type="file" id="file-input" accept=".txt" class="hidden">
                <label for="file-input" id="drop-zone" class="flex flex-col items-center justify-center w-full h-64 bg-[#0a0a0a] border-2 border-dashed border-cyan-900 hover:border-cyan-400 p-6 text-center cursor-pointer transition-all">
                    <span id="file-status-text" class="text-gray-400 text-lg uppercase tracking-wider font-bold">
                        Click or Drag to Upload Quiz.txt
                    </span>
                    <span class="text-xs text-gray-600 mt-3">
                        Must follow standard Question / Options / Answer format blocks
                    </span>
                </label>
            </div>
            
            <div class="flex items-center space-x-3 p-2">
                <input type="checkbox" id="scramble-toggle" class="w-5 h-5 accent-cyan-500 bg-[#0a0a0a] border-cyan-800 cursor-pointer">
                <label for="scramble-toggle" class="text-gray-400 uppercase tracking-wide cursor-pointer hover:text-cyan-400 transition-colors">Enable Entropy (Scramble Questions)</label>
            </div>

            <button id="start-btn" class="w-full bg-cyan-950 hover:bg-cyan-800 text-cyan-400 hover:text-cyan-100 font-bold py-4 px-6 border border-cyan-500 uppercase tracking-widest transition-all cyan-glow opacity-50 cursor-not-allowed" disabled>
                Initialize_Practice_Run
            </button>
        </div>

        <div id="quiz-view" class="hidden space-y-10 pb-20">
            <div id="questions-container" class="space-y-10">
                </div>
            
            <div id="scorecard" class="hidden p-8 bg-[#0a0a0a] border-2 border-cyan-500 text-center space-y-4 cyan-glow">
                <h2 class="text-2xl font-bold text-cyan-400 tracking-widest uppercase">// PERFORMANCE_METRICS_EVALUATED</h2>
                <div class="text-5xl font-extrabold text-white tracking-wider my-4">
                    SCORE: <span id="final-score" class="text-emerald-400">0</span> / <span id="final-total">0</span>
                </div>
                <div class="text-xl font-bold text-gray-400">
                    ACCURACYRATING: <span id="final-percent" class="text-cyan-400">0%</span>
                </div>
                <p id="performance-grade" class="text-sm text-gray-500 italic uppercase tracking-wide"></p>
            </div>

            <button id="reset-btn" class="w-full bg-[#0a0a0a] hover:bg-[#111] text-gray-500 hover:text-cyan-400 font-bold py-4 px-6 border border-gray-800 hover:border-cyan-800 uppercase tracking-widest mt-12 transition-colors">
                Terminate & Restart_System
            </button>
        </div>

    </div>

    <script>
        // Core Engine Variables
        const setupView = document.getElementById('setup-view');
        const quizView = document.getElementById('quiz-view');
        const fileInput = document.getElementById('file-input');
        const fileStatusText = document.getElementById('file-status-text');
        const scrambleToggle = document.getElementById('scramble-toggle');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const questionsContainer = document.getElementById('questions-container');
        const liveCounter = document.getElementById('live-counter');
        const answeredCountEl = document.getElementById('answered-count');
        const totalCountEl = document.getElementById('total-count');
        const scorecard = document.getElementById('scorecard');

        let rawFileContent = "";
        let totalQuestions = 0;
        let answeredQuestions = 0;
        let correctAnswersCount = 0;

        // File State Listener
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileStatusText.innerText = `READY // LOADING: ${file.name.toUpperCase()}`;
            fileStatusText.classList.remove('text-gray-400');
            fileStatusText.classList.add('text-cyan-400');

            const reader = new FileReader();
            reader.onload = function(evt) {
                rawFileContent = evt.target.result;
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            };
            reader.readAsText(file);
        });

        // Drag and Drop aesthetics handler
        const dropZone = document.getElementById('drop-zone');
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-cyan-400', 'bg-cyan-950/20');
            }, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-cyan-400', 'bg-cyan-950/20');
            }, false);
        });
        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if(files.length) {
                fileInput.files = files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        // State Transition: Start Execution Run
        startBtn.addEventListener('click', () => {
            if (!rawFileContent.trim()) return;

            let parsedQuiz = parseTextEngine(rawFileContent);
            totalQuestions = parsedQuiz.length;
            answeredQuestions = 0;
            correctAnswersCount = 0;

            if (scrambleToggle.checked) {
                parsedQuiz = scrambleArray(parsedQuiz);
            }

            // Init tracking counters
            totalCountEl.innerText = totalQuestions;
            answeredCountEl.innerText = 0;
            liveCounter.classList.remove('hidden');
            scorecard.classList.add('hidden');

            renderInterface(parsedQuiz);
            setupView.classList.add('hidden');
            quizView.classList.remove('hidden');
            window.scrollTo(0, 0);
        });

        // State Transition: Reset
        resetBtn.addEventListener('click', () => {
            quizView.classList.add('hidden');
            setupView.classList.remove('hidden');
            liveCounter.classList.add('hidden');
            scorecard.classList.add('hidden');
            questionsContainer.innerHTML = '';
            fileInput.value = ""; 
            rawFileContent = "";
            fileStatusText.innerText = "Click or Drag to Upload Quiz.txt";
            fileStatusText.classList.remove('text-cyan-400');
            fileStatusText.classList.add('text-gray-400');
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');
            window.scrollTo(0, 0);
        });

        // Lexical Parser
        function parseTextEngine(text) {
            const blocks = text.trim().split(/\n\s*\n/);
            const validData = [];

            blocks.forEach((block, index) => {
                const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
                if (lines.length < 3) return; 

                const question = lines[0];
                const options = lines.slice(1, lines.length - 1);
                const rawAnswer = lines[lines.length - 1];
                
                const cleanAnswer = rawAnswer.replace(/^(Answer:|Ans:|Answer)\s*/i, '').trim();

                validData.push({
                    id: `q_${index}`,
                    question: question,
                    options: options,
                    answer: cleanAnswer
                });
            });
            return validData;
        }

        // Fisher-Yates Scrambler
        function scrambleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // DOM Rendering Engine
        function renderInterface(quizData) {
            questionsContainer.innerHTML = '';

            quizData.forEach((item, index) => {
                const blockDiv = document.createElement('div');
                blockDiv.className = 'p-6 md:p-8 bg-[#070707] border-l-4 border-cyan-800 shadow-lg';
                
                const qText = document.createElement('h3');
                qText.className = 'text-xl font-bold text-gray-200 mb-6 leading-relaxed';
                qText.innerText = `${index + 1}. ${item.question}`;
                blockDiv.appendChild(qText);

                const optionsContainer = document.createElement('div');
                optionsContainer.className = 'flex flex-col space-y-3';
                
                item.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option text-left px-5 py-4 bg-[#0a0a0a] border border-gray-800 text-gray-400 hover:border-cyan-600 hover:text-cyan-200 hover:bg-[#0f172a]';
                    btn.innerText = opt;
                    
                    btn.addEventListener('click', () => {
                        evaluateSelection(btn, opt, item.answer, optionsContainer);
                    });
                    
                    optionsContainer.appendChild(btn);
                });

                blockDiv.appendChild(optionsContainer);
                questionsContainer.appendChild(blockDiv);
            });
        }

        // Logic Evaluation
        function evaluateSelection(selectedBtn, selectedText, correctAnswer, container) {
            const allButtons = container.querySelectorAll('button');
            let matched = selectedText.toLowerCase() === correctAnswer.toLowerCase();
            
            if (matched) {
                correctAnswersCount++;
            }

            allButtons.forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('hover:border-cyan-600', 'hover:bg-[#0f172a]', 'hover:text-cyan-200');
                
                if (btn.innerText.toLowerCase() === correctAnswer.toLowerCase()) {
                    btn.classList.remove('bg-[#0a0a0a]', 'border-gray-800', 'text-gray-400');
                    btn.classList.add('bg-[#064e3b]', 'border-[#10b981]', 'text-[#34d399]'); 
                }
            });

            if (!matched) {
                selectedBtn.classList.remove('bg-[#0a0a0a]', 'border-gray-800', 'text-gray-400');
                selectedBtn.classList.add('bg-[#7f1d1d]', 'border-[#ef4444]', 'text-[#fca5a5]'); 
            }

            // Update Progression States
            answeredQuestions++;
            answeredCountEl.innerText = answeredQuestions;

            // Trigger terminal scorecard if completion parameters are met
            if (answeredQuestions === totalQuestions) {
                displayFinalScorecard();
            }
        }

        // Final Scoreboard Display Logic
        function displayFinalScorecard() {
            const percentage = Math.round((correctAnswersCount / totalQuestions) * 100);
            
            document.getElementById('final-score').innerText = correctAnswersCount;
            document.getElementById('final-total').innerText = totalQuestions;
            document.getElementById('final-percent').innerText = `${percentage}%`;

            // Performance conditional evaluations
            let gradingPhrase = "";
            if (percentage === 100) gradingPhrase = "Perfect run. Matrix optimized.";
            else if (percentage >= 85) gradingPhrase = "Excellent comprehension. High efficiency.";
            else if (percentage >= 70) gradingPhrase = "Passing baseline cleared. Room for stabilization.";
            else gradingPhrase = "Deficient accuracy. Re-run file configuration recommended.";

            document.getElementById('performance-grade').innerText = `>> ${gradingPhrase}`;
            
            scorecard.classList.remove('hidden');
            scorecard.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
